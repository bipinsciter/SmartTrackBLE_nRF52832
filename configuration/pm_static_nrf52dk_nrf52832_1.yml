# 1. Monolithic application layout starting from absolute zero
app:
  address: 0x0
  region: flash_primary
  size: 0x7A000 # 480 KB

appconfig_storage:
  address: 0x7a000
  region: flash_primary
  size: 0x2000

bt_fast_pair:
  address: 0x7c000
  region: flash_primary
  size: 0x1000

settings_storage:
  address: 0x7d000
  region: flash_primary
  size: 0x3000

# 0x7D000 - 0x80000 (12KB) left blank as a safe hardware guard band